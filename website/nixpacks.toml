[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.26.1 --activate",
  "cd .. && pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["cd .. && pnpm --filter @workspace/website run build"]

[start]
cmd = "npx serve ../artifacts/website/dist/public -s -l ${PORT:-3000}"
