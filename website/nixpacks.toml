[phases.setup]
nixPkgs = ["nodejs_24"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.26.1 --activate",
  "cd .. && pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["cd .. && pnpm --filter @workspace/website run build"]

[start]
cmd = "node -e \"require('child_process').spawn('npx',['serve','../artifacts/website/dist/public','-s','-l',process.env.PORT||'3000'],{stdio:'inherit'})\""
